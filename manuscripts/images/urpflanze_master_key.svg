<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" style="background:#0d1117;font-family:Georgia,serif">
<defs>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/></filter>
  <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#40916c"/><stop offset="100%" stop-color="#2d6a4f"/></linearGradient>
  <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5c4d3c"/><stop offset="100%" stop-color="#8b7355"/></linearGradient>
  <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0c040"/><stop offset="100%" stop-color="#d4a017"/></linearGradient>
  <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#d4a017"/></marker>
</defs>

<!-- Title -->
<text x="500" y="36" text-anchor="middle" fill="#d4a017" font-size="20" font-weight="bold" filter="url(#glow)">The Urpflanze — Morphological Reading Key</text>
<text x="500" y="56" text-anchor="middle" fill="#8b949e" font-size="12" font-style="italic">How the Seven Discriminating Primitives Are Read from the Plant Body</text>

<!-- Ground line -->
<line x1="50" y1="620" x2="950" y2="620" stroke="#30363d" stroke-width="1"/>
<text x="500" y="645" text-anchor="middle" fill="#484f58" font-size="11">SOLUM — the plant body is the opcode; preparation is the runtime</text>

<!-- === MAIN STEM === -->
<path d="M500,630 L500,160" stroke="url(#stemGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>

<!-- === ROOT SYSTEM === -->
<path d="M500,630 Q490,660 470,690" stroke="#8b7355" stroke-width="3" fill="none"/>
<path d="M500,630 Q510,660 530,690" stroke="#8b7355" stroke-width="3" fill="none"/>
<path d="M500,630 Q495,670 485,700" stroke="#8b7355" stroke-width="2" fill="none"/>
<path d="M500,630 Q505,670 515,700" stroke="#8b7355" stroke-width="2" fill="none"/>
<text x="470" y="712" text-anchor="middle" fill="#8b949e" font-size="9">radix</text>

<!-- === BRANCH 1 (left, upper) — with LEAF cluster === -->
<path d="M500,220 Q440,200 380,170" stroke="url(#stemGrad)" stroke-width="3" fill="none"/>
<ellipse cx="370" cy="155" rx="32" ry="18" fill="url(#leafGrad)" transform="rotate(-30,370,155)" opacity="0.9"/>
<ellipse cx="355" cy="175" rx="28" ry="16" fill="#52b788" transform="rotate(-15,355,175)" opacity="0.8"/>
<ellipse cx="385" cy="140" rx="26" ry="15" fill="#40916c" transform="rotate(-45,385,140)" opacity="0.85"/>

<!-- BRANCH 2 (right, upper) -->
<path d="M500,280 Q560,260 620,240" stroke="url(#stemGrad)" stroke-width="3" fill="none"/>
<ellipse cx="630" cy="225" rx="30" ry="17" fill="url(#leafGrad)" transform="rotate(25,630,225)" opacity="0.9"/>
<ellipse cx="645" cy="245" rx="26" ry="15" fill="#52b788" transform="rotate(10,645,245)" opacity="0.8"/>

<!-- BRANCH 3 (left, lower) -->
<path d="M500,360 Q440,350 390,370" stroke="url(#stemGrad)" stroke-width="3" fill="none"/>
<ellipse cx="380" cy="360" rx="28" ry="16" fill="#40916c" transform="rotate(-20,380,360)" opacity="0.85"/>
<ellipse cx="365" cy="380" rx="24" ry="14" fill="#52b788" opacity="0.8"/>

<!-- BRANCH 4 (right, lower) -->
<path d="M500,430 Q560,440 610,460" stroke="url(#stemGrad)" stroke-width="3" fill="none"/>
<ellipse cx="620" cy="450" rx="27" ry="15" fill="#40916c" transform="rotate(20,620,450)" opacity="0.85"/>
<!-- ============================================================ -->
<!-- CALLOUT 4: Ħ (Chirality) — right side, mid -->
<!-- ============================================================ -->
<line x1="500" y1="420" x2="870" y2="340" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGold)"/>
<rect x="720" y="300" width="250" height="78" rx="8" fill="#161b22" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="732" y="318" fill="#9b59b6" font-size="13" font-weight="bold">Ħ CHIRALITY</text>
<text x="732" y="333" fill="#f0f6fc" font-size="10">Stereochemical fidelity steps</text>
<text x="732" y="348" fill="#f0f6fc" font-size="10">from biosynthesis → receptor</text>
<text x="732" y="363" fill="#f0f6fc" font-size="10">1 step = 𐑒, 2 steps = 𐑖 (Frob. min)</text>
<text x="732" y="375" fill="#8b949e" font-size="9" font-style="italic">unlimited = 𐑫 (Axiom A terminal)</text>

<!-- Biosynthesis arrow decoration -->
<path d="M740,390 L760,390 L755,385 M760,390 L755,395" stroke="#9b59b6" stroke-width="1" fill="none"/>
<path d="M770,390 L790,390 L785,385 M790,390 L785,395" stroke="#9b59b6" stroke-width="1" fill="none"/>
<path d="M800,390 L820,390 L815,385 M820,390 L815,395" stroke="#9b59b6" stroke-width="1" fill="none" stroke-dasharray="2,1"/>
<text x="745" y="405" fill="#9b59b6" font-size="7">enzyme</text>
<text x="775" y="405" fill="#9b59b6" font-size="7">enzyme</text>
<text x="805" y="405" fill="#9b59b6" font-size="7">...</text>

<!-- ============================================================ -->
<!-- CALLOUT 5: Γ (Cardinality) — left side, lower -->
<!-- ============================================================ -->
<line x1="400" y1="370" x2="100" y2="430" stroke="#a2d6f9" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGold)"/>
<rect x="30" y="400" width="220" height="78" rx="8" fill="#161b22" stroke="#a2d6f9" stroke-width="1.5" filter="url(#shadow)"/>
<text x="42" y="418" fill="#a2d6f9" font-size="13" font-weight="bold">Γ CARDINALITY</text>
<text x="42" y="433" fill="#f0f6fc" font-size="10">Number of tissue systems targeted</text>
<text x="42" y="448" fill="#f0f6fc" font-size="10">1 system = 𐑲 (local)</text>
<text x="42" y="463" fill="#f0f6fc" font-size="10">2–4 systems = 𐑔 (mesoscale)</text>
<text x="42" y="475" fill="#8b949e" font-size="9" font-style="italic">read from organ affinity pattern</text>

<!-- Organ icons -->
<circle cx="70" cy="495" r="6" fill="none" stroke="#a2d6f9" stroke-width="0.7"/><text x="70" y="507" text-anchor="middle" fill="#a2d6f9" font-size="7">lung</text>
<circle cx="100" cy="495" r="6" fill="none" stroke="#a2d6f9" stroke-width="0.7"/><text x="100" y="507" text-anchor="middle" fill="#a2d6f9" font-size="7">heart</text>
<circle cx="130" cy="495" r="6" fill="none" stroke="#a2d6f9" stroke-width="0.7"/><text x="130" y="507" text-anchor="middle" fill="#a2d6f9" font-size="7">brain</text>
<circle cx="160" cy="495" r="6" fill="none" stroke="#a2d6f9" stroke-width="0.7"/><text x="160" y="507" text-anchor="middle" fill="#a2d6f9" font-size="7">liver</text>

<!-- ============================================================ -->
<!-- CALLOUT 6: Σ (Stoichiometry) — center left -->
<!-- ============================================================ -->
<line x1="390" y1="360" x2="100" y2="550" stroke="#95d5b2" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGold)"/>
<rect x="30" y="530" width="220" height="62" rx="8" fill="#161b22" stroke="#95d5b2" stroke-width="1.5" filter="url(#shadow)"/>
<text x="42" y="548" fill="#95d5b2" font-size="13" font-weight="bold">Σ STOICHIOMETRY</text>
<text x="42" y="563" fill="#f0f6fc" font-size="10">Compound class diversity</text>
<text x="42" y="578" fill="#f0f6fc" font-size="10">1 class = 𐑙, few = 𐑕, many = 𐑳</text>
<text x="42" y="590" fill="#8b949e" font-size="9" font-style="italic">read from chemotaxonomic profile</text>
<!-- ============================================================ -->
<!-- CALLOUT 7: ɢ (Composition) — right side, bottom -->
<!-- ============================================================ -->
<line x1="610" y1="460" x2="870" y2="500" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGold)"/>
<rect x="720" y="460" width="250" height="78" rx="8" fill="#161b22" stroke="#f0c040" stroke-width="1.5" filter="url(#shadow)"/>
<text x="732" y="478" fill="#f0c040" font-size="13" font-weight="bold">ɢ COMPOSITION</text>
<text x="732" y="493" fill="#f0f6fc" font-size="10">Temporal/spatial release pattern</text>
<text x="732" y="508" fill="#f0f6fc" font-size="10">simultaneous = 𐑝 (conjunctive)</text>
<text x="732" y="523" fill="#f0f6fc" font-size="10">ordered sequence = 𐑠 (sequential)</text>
<text x="732" y="535" fill="#8b949e" font-size="9" font-style="italic">spatial broadcast = 𐑵 (no fixed order)</text>

<!-- Sequence diagram decoration -->
<rect x="740" y="550" width="16" height="10" rx="2" fill="#d4a017" opacity="0.4"/>
<text x="748" y="558" text-anchor="middle" fill="#f0f6fc" font-size="6">A</text>
<text x="760" y="558" fill="#8b949e" font-size="9">→</text>
<rect x="770" y="550" width="16" height="10" rx="2" fill="#d4a017" opacity="0.6"/>
<text x="778" y="558" text-anchor="middle" fill="#f0f6fc" font-size="6">B</text>
<text x="790" y="558" fill="#8b949e" font-size="9">→</text>
<rect x="800" y="550" width="16" height="10" rx="2" fill="#d4a017" opacity="0.8"/>
<text x="808" y="558" text-anchor="middle" fill="#0d1117" font-size="6">C</text>
<text x="740" y="575" fill="#8b949e" font-size="8">extraction order = program counter</text>

<!-- ============================================================ -->
<!-- FIXED PRIMITIVES LEGEND (bottom) -->
<!-- ============================================================ -->
<rect x="30" y="610" width="340" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="45" y="628" fill="#8b949e" font-size="10" font-weight="bold">FIXED PRIMITIVES (all medicinal plants):</text>
<text x="45" y="643" fill="#8b949e" font-size="9">D = 𐑼 (infinite-dim) · T = 𐑸 (self-referential) · R = 𐑾 (bidirectional) · P = 𐑬 (partial) · F = 𐑱 (classical)</text>
<text x="45" y="658" fill="#484f58" font-size="8" font-style="italic">These five are invariant across the entire pharmacopoeia — only Ç, Γ, φ̂, Ħ, Σ, Ω, ɢ discriminate</text>

<!-- TIER LEGEND -->
<rect x="600" y="610" width="370" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="615" y="628" fill="#d4a017" font-size="10" font-weight="bold">OUROBORICITY TIERS:</text>
<rect x="615" y="636" width="12" height="12" rx="3" fill="#f77f00"/><text x="632" y="647" fill="#f0f6fc" font-size="9">O₁ — sub-critical or trivial winding</text>
<rect x="760" y="636" width="12" height="12" rx="3" fill="#e94560"/><text x="777" y="647" fill="#f0f6fc" font-size="9">O₂ — critical, chiral, wound</text>
<rect x="895" y="636" width="12" height="12" rx="3" fill="#9b59b6"/><text x="912" y="647" fill="#f0f6fc" font-size="9">O₂† — eternal chirality or binary winding</text>

<!-- Central plant label -->
<text x="500" y="695" text-anchor="middle" fill="#d4a017" font-size="11" font-style="italic">"The morphology is the opcode. The plant body is the program."</text>
</svg>
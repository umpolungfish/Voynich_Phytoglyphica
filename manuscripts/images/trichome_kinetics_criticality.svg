<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" style="background:#0d1117;font-family:Georgia,serif">
<defs>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/></filter>
  <linearGradient id="cuticle" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2d5016"/><stop offset="100%" stop-color="#1a3a0a"/></linearGradient>
  <linearGradient id="cellGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3a6b25"/><stop offset="100%" stop-color="#2d5016"/></linearGradient>
  <linearGradient id="oilGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0c040"/><stop offset="100%" stop-color="#d4a017"/></linearGradient>
  <linearGradient id="resinGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e94560"/><stop offset="100%" stop-color="#a4162b"/></linearGradient>
</defs>

<!-- Title -->
<text x="430" y="28" text-anchor="middle" fill="#f77f00" font-size="17" font-weight="bold" filter="url(#glow)">Ç-Kinetics &amp; φ̂-Criticality: Reading the Glandular Trichome</text>
<text x="430" y="46" text-anchor="middle" fill="#8b949e" font-size="10" font-style="italic">How trichome structure encodes kinetics (Ç) and trichome density/color encodes criticality (φ̂)</text>

<!-- ============================================================ -->
<!-- LEAF CROSS-SECTION (center) -->
<!-- ============================================================ -->

<!-- Leaf outline -->
<path d="M30,180 Q430,100 830,180 L830,380 Q430,460 30,380 Z" fill="#1a3a0a" stroke="#40916c" stroke-width="2"/>

<!-- Palisade mesophyll -->
<rect x="60" y="200" width="740" height="60" rx="4" fill="#2d5016" opacity="0.7"/>
<text x="430" y="235" text-anchor="middle" fill="#52b788" font-size="10">PALISADE MESOPHYLL (photosynthetic)</text>

<!-- Spongy mesophyll -->
<rect x="60" y="270" width="740" height="60" rx="4" fill="#1a3a0a" opacity="0.6"/>
<circle cx="150" cy="300" r="8" fill="none" stroke="#2d5016" stroke-width="0.5"/>
<circle cx="250" cy="295" r="10" fill="none" stroke="#2d5016" stroke-width="0.5"/>
<circle cx="380" cy="305" r="7" fill="none" stroke="#2d5016" stroke-width="0.5"/>
<circle cx="500" cy="298" r="9" fill="none" stroke="#2d5016" stroke-width="0.5"/>
<circle cx="620" cy="302" r="8" fill="none" stroke="#2d5016" stroke-width="0.5"/>
<circle cx="720" cy="296" r="10" fill="none" stroke="#2d5016" stroke-width="0.5"/>
<text x="430" y="320" text-anchor="middle" fill="#52b788" font-size="9">SPONGY MESOPHYLL (air spaces for volatile diffusion)</text>

<!-- Vascular bundle -->
<rect x="350" y="205" width="160" height="125" rx="6" fill="#5c4d3c" opacity="0.5" stroke="#8b7355" stroke-width="1"/>
<text x="430" y="340" text-anchor="middle" fill="#d4a017" font-size="9">VASCULAR BUNDLE (xylem + phloem)</text>

<!-- Lower epidermis -->
<rect x="50" y="340" width="760" height="18" rx="3" fill="#2d5016" stroke="#40916c" stroke-width="0.8"/>
<text x="430" y="353" text-anchor="middle" fill="#52b788" font-size="9">LOWER EPIDERMIS</text>

<!-- Upper epidermis -->
<rect x="50" y="182" width="760" height="18" rx="3" fill="#2d5016" stroke="#40916c" stroke-width="0.8"/>

<!-- ============================================================ -->
<!-- GLANDULAR TRICHOMES (on upper surface) -->
<!-- ============================================================ -->

<!-- Capitate trichome 1 (large, glandular) -->
<line x1="120" y1="182" x2="120" y2="140" stroke="#8b7355" stroke-width="2"/>
<ellipse cx="120" cy="132" rx="14" ry="10" fill="url(#oilGrad)" stroke="#d4a017" stroke-width="1"/>
<circle cx="117" cy="129" r="2" fill="#fff" opacity="0.4"/>

<!-- Capitate trichome 2 -->
<line x1="200" y1="182" x2="200" y2="145" stroke="#8b7355" stroke-width="2"/>
<ellipse cx="200" cy="138" rx="12" ry="9" fill="url(#oilGrad)" stroke="#d4a017" stroke-width="1"/>
<circle cx="197" cy="135" r="2" fill="#fff" opacity="0.4"/>

<!-- Peltate trichome (broad, multicellular head) -->
<line x1="360" y1="182" x2="360" y2="124" stroke="#8b7355" stroke-width="2.5"/>
<ellipse cx="360" cy="118" rx="18" ry="8" fill="url(#oilGrad)" stroke="#d4a017" stroke-width="1.2"/>
<text x="360" y="112" text-anchor="middle" fill="#f0c040" font-size="7">PELTATE</text>

<!-- Capitate trichome 3 -->
<line x1="500" y1="182" x2="500" y2="142" stroke="#8b7355" stroke-width="2"/>
<ellipse cx="500" cy="135" rx="13" ry="9" fill="url(#oilGrad)" stroke="#d4a017" stroke-width="1"/>

<!-- Non-glandular trichome (simple hair) -->
<line x1="660" y1="182" x2="660" y2="148" stroke="#8b949e" stroke-width="1"/>
<line x1="660" y1="168" x2="670" y2="160" stroke="#8b949e" stroke-width="0.8"/>
<text x="660" y="143" text-anchor="middle" fill="#8b949e" font-size="7">SIMPLE</text>

<!-- Resin canal (internal) -->
<ellipse cx="240" cy="230" rx="30" ry="10" fill="url(#resinGrad)" opacity="0.5" stroke="#e94560" stroke-width="0.5"/>
<text x="240" y="225" text-anchor="middle" fill="#e94560" font-size="7">RESIN CANAL</text>

<!-- ============================================================ -->
<!-- ANNOTATIONS -->
<!-- ============================================================ -->

<!-- Ç Annotation -->
<line x1="360" y1="118" x2="360" y2="55" stroke="#f77f00" stroke-width="1.5" stroke-dasharray="3,2"/>
<line x1="360" y1="55" x2="680" y2="55" stroke="#f77f00" stroke-width="1"/>
<rect x="670" y="30" width="175" height="65" rx="6" fill="#161b22" stroke="#f77f00" stroke-width="1.2" filter="url(#shadow)"/>
<text x="682" y="48" fill="#f77f00" font-size="11" font-weight="bold">Ç = 𐑤 (frozen-order)</text>
<text x="682" y="63" fill="#f0f6fc" font-size="9">Compounds sequestered in</text>
<text x="682" y="78" fill="#f0f6fc" font-size="9">glandular trichomes — must be</text>
<text x="682" y="90" fill="#f0f6fc" font-size="9">mechanically ruptured (PUSH)</text>

<!-- φ̂ Annotation -->
<line x1="360" y1="118" x2="360" y2="55" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>
<line x1="360" y1="55" x2="40" y2="55" stroke="#e94560" stroke-width="1"/>
<rect x="15" y="30" width="200" height="75" rx="6" fill="#161b22" stroke="#e94560" stroke-width="1.2" filter="url(#shadow)"/>
<text x="27" y="48" fill="#e94560" font-size="11" font-weight="bold">φ̂ = ⊙ (self-modeling)</text>
<text x="27" y="63" fill="#f0f6fc" font-size="9">Trichome density, leaf color,</text>
<text x="27" y="78" fill="#f0f6fc" font-size="9">odor intensity all encode</text>
<text x="27" y="93" fill="#f0f6fc" font-size="9">pharmaceutical potency — the</text>
<text x="27" y="105" fill="#8b949e" font-size="8" font-style="italic">plant reports its own state</text>
<!-- ============================================================ -->
<!-- Ç Reading Table: Kinetics values -->
<!-- ============================================================ -->
<text x="430" y="385" text-anchor="middle" fill="#d4a017" font-size="12" font-weight="bold">Ç Kinetics Values — How Trichome Structure Encodes the Opcode</text>

<!-- Ç = 𐑤 row (frozen-order) -->
<rect x="50" y="398" width="370" height="55" rx="6" fill="#161b22" stroke="#f77f00" stroke-width="1"/>
<text x="65" y="416" fill="#f77f00" font-size="11" font-weight="bold">Ç = 𐑤 (frozen-order / trapped)</text>
<text x="65" y="432" fill="#f0f6fc" font-size="9">Glandular trichomes with cuticular shell. Volatiles trapped —</text>
<text x="65" y="447" fill="#f0f6fc" font-size="9">mechanical rupture REQUIRED. Opcode = PUSH (crush leaf).</text>
<text x="65" y="460" fill="#8b949e" font-size="8">Type I, II, III, IV, V, VII, IX, XI — most medicinal plants</text>

<!-- Ç = 𐑧 row (slow / near-equilibrium) -->
<rect x="440" y="398" width="370" height="55" rx="6" fill="#161b22" stroke="#06d6a0" stroke-width="1"/>
<text x="455" y="416" fill="#06d6a0" font-size="11" font-weight="bold">Ç = 𐑧 (slow / near-equilibrium)</text>
<text x="455" y="432" fill="#f0f6fc" font-size="9">Compounds in solution or free in tissue. Release is diffusion-</text>
<text x="455" y="447" fill="#f0f6fc" font-size="9">limited — no trapping structure. Opcode = STEEP (time).</text>
<text x="455" y="460" fill="#8b949e" font-size="8">Type VI (Adaptogen), VIII (Caffeine), X (Saponin)</text>

<!-- ============================================================ -->
<!-- φ̂ Self-Report Gradient -->
<!-- ============================================================ -->
<text x="430" y="485" text-anchor="middle" fill="#d4a017" font-size="12" font-weight="bold">φ̂ Criticality Self-Report Gradient</text>

<!-- Gradient bar -->
<rect x="50" y="498" width="760" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<!-- Gradient fill -->
<defs><linearGradient id="critGrad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#2d5016"/><stop offset="25%" stop-color="#52b788"/>
  <stop offset="50%" stop-color="#95d5b2"/><stop offset="75%" stop-color="#e94560"/>
  <stop offset="100%" stop-color="#a4162b"/>
</linearGradient></defs>
<rect x="50" y="498" width="760" height="20" rx="4" fill="url(#critGrad)"/>

<!-- Labels on gradient -->
<text x="80" y="542" text-anchor="middle" fill="#52b788" font-size="8">pale leaves = immature</text>
<text x="200" y="542" text-anchor="middle" fill="#95d5b2" font-size="8">moderate trichomes</text>
<text x="340" y="542" text-anchor="middle" fill="#f0c040" font-size="8">silver-canescent = peak</text>
<text x="480" y="542" text-anchor="middle" fill="#f77f00" font-size="8">dark, dense = toxic</text>
<text x="640" y="542" text-anchor="middle" fill="#e94560" font-size="8">purpling = overripe</text>
<text x="770" y="542" text-anchor="middle" fill="#a4162b" font-size="8">browning = spent</text>

<text x="430" y="562" text-anchor="middle" fill="#f0f6fc" font-size="10">The plant <tspan fill="#e94560" font-weight="bold">reports its own pharmaceutical state</tspan> — the Operator reads potency from morphology</text>

<!-- === φ̂ Values Table === -->
<text x="430" y="590" text-anchor="middle" fill="#d4a017" font-size="11" font-weight="bold">φ̂ Values</text>
<text x="130" y="608" fill="#e94560" font-size="10">⊙ (critical) = Gate 1 open — morphology encodes state: Types I, II, III, V, VI, VII, IX, X, XI</text>
<text x="130" y="622" fill="#8b949e" font-size="10">𐑢 (sub-critical) = Gate 1 closed — no self-report: Types IV, VIII</text>

</svg>
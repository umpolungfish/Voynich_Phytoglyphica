<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" style="background:#0d1117;font-family:Georgia,serif">
<defs>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/></filter>
</defs>

<!-- Title -->
<text x="430" y="32" text-anchor="middle" fill="#06d6a0" font-size="18" font-weight="bold" filter="url(#glow)">Ω-Winding: Reading the Phyllotaxis Spiral Count</text>
<text x="430" y="52" text-anchor="middle" fill="#8b949e" font-size="11" font-style="italic">How the plant's leaf arrangement encodes the number of preparation cycles</text>

<!-- === LEFT: Fibonacci Spiral Diagram === -->
<text x="300" y="78" text-anchor="middle" fill="#d4a017" font-size="13" font-weight="bold">Fibonacci Parastichy Counting</text>

<!-- Stem cross-section with spirals -->
<circle cx="300" cy="240" r="155" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<circle cx="300" cy="240" r="140" fill="none" stroke="#30363d" stroke-width="0.5"/>
<circle cx="300" cy="240" r="125" fill="none" stroke="#30363d" stroke-width="0.3"/>
<circle cx="300" cy="240" r="110" fill="none" stroke="#30363d" stroke-width="0.3"/>
<circle cx="300" cy="240" r="95" fill="none" stroke="#30363d" stroke-width="0.3"/>
<circle cx="300" cy="240" r="80" fill="none" stroke="#30363d" stroke-width="0.3"/>
<circle cx="300" cy="240" r="65" fill="none" stroke="#30363d" stroke-width="0.3"/>
<circle cx="300" cy="240" r="50" fill="none" stroke="#30363d" stroke-width="0.3"/>
<circle cx="300" cy="240" r="35" fill="none" stroke="#30363d" stroke-width="0.3"/>

<!-- 8 clockwise parastichies (red-orange) -->
<g stroke="#e94560" stroke-width="1.5" fill="none" opacity="0.7">
  <path d="M300,240 Q320,220 340,200 Q370,170 400,155"/>
  <path d="M300,240 Q280,220 260,200 Q230,170 220,190 Q200,220 195,255"/>
  <path d="M300,240 Q320,260 340,280 Q370,310 380,330"/>
  <path d="M300,240 Q270,260 250,290 Q230,320 210,340"/>
  <path d="M300,240 Q310,225 330,210 Q360,190 390,195 Q420,200 420,230"/>
  <path d="M300,240 Q290,225 270,210 Q240,190 210,205 Q190,225 185,270"/>
  <path d="M300,240 Q340,270 380,300 Q410,335 410,375"/>
  <path d="M300,240 Q250,270 210,300 Q180,335 180,375"/>
</g>

<!-- 5 counterclockwise parastichies (teal) -->
<g stroke="#06d6a0" stroke-width="1.8" fill="none" opacity="0.8">
  <path d="M300,240 Q330,220 370,215 Q410,210 440,240"/>
  <path d="M300,240 Q260,215 220,225 Q190,245 180,295"/>
  <path d="M300,240 Q340,275 380,310 Q410,350 390,395"/>
  <path d="M300,240 Q270,275 240,310 Q210,350 230,390"/>
  <path d="M300,240 Q320,250 340,270 Q370,305 400,295 Q430,280 440,240"/>
</g>

<!-- Leaf primordia dots (along intersections) -->
<circle cx="405" cy="185" r="3" fill="#f0c040"/><circle cx="430" cy="200" r="3" fill="#f0c040"/>
<circle cx="440" cy="220" r="3" fill="#f0c040"/><circle cx="435" cy="245" r="3" fill="#f0c040"/>
<circle cx="420" cy="330" r="3" fill="#f0c040"/><circle cx="400" cy="355" r="3" fill="#f0c040"/>
<circle cx="195" cy="240" r="3" fill="#f0c040"/><circle cx="190" cy="270" r="3" fill="#f0c040"/>
<circle cx="205" cy="310" r="3" fill="#f0c040"/><circle cx="230" cy="340" r="3" fill="#f0c040"/>
<circle cx="380" cy="375" r="3" fill="#f0c040"/><circle cx="210" cy="200" r="3" fill="#f0c040"/>
<circle cx="350" cy="175" r="3" fill="#f0c040"/><circle cx="205" cy="375" r="3" fill="#f0c040"/>
<circle cx="290" cy="395" r="3" fill="#f0c040"/><circle cx="340" cy="398" r="3" fill="#f0c040"/>

<!-- Center -->
<circle cx="300" cy="240" r="4" fill="#f0c040"/>

<!-- Legend for spiral -->
<rect x="450" y="165" width="190" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
<line x1="462" y1="185" x2="490" y2="185" stroke="#e94560" stroke-width="2"/><text x="498" y="189" fill="#f0f6fc" font-size="9">8 clockwise parastichies</text>
<line x1="462" y1="203" x2="490" y2="203" stroke="#06d6a0" stroke-width="2"/><text x="498" y="207" fill="#f0f6fc" font-size="9">5 counterclockwise</text>
<text x="462" y="218" fill="#8b949e" font-size="8" font-style="italic">Fibonacci: 5+8 → Ω = 13 (ℤ)</text>
<!-- === RIGHT SIDE: Golden Angle & Decussate === -->
<text x="700" y="78" text-anchor="middle" fill="#d4a017" font-size="13" font-weight="bold">Divergence Angle</text>

<!-- Golden angle diagram -->
<circle cx="700" cy="210" r="55" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<circle cx="700" cy="210" r="40" fill="none" stroke="#30363d" stroke-width="0.5"/>
<line x1="700" y1="210" x2="700" y2="155" stroke="#f0c040" stroke-width="1"/>
<line x1="700" y1="210" x2="737" y2="184" stroke="#06d6a0" stroke-width="1"/>
<path d="M700,170 A40,40 0 0,1 737,184" fill="none" stroke="#e94560" stroke-width="2"/>
<text x="725" y="168" fill="#e94560" font-size="9">137.5°</text>
<text x="700" y="280" text-anchor="middle" fill="#f0f6fc" font-size="10">Golden angle ≈ 137.5°</text>
<text x="700" y="295" text-anchor="middle" fill="#8b949e" font-size="8">(360° × φ⁻² = 360/φ²)</text>

<!-- Decussate example -->
<circle cx="700" cy="380" r="55" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<line x1="700" y1="340" x2="700" y2="420" stroke="#8b949e" stroke-width="0.8"/>
<line x1="660" y1="380" x2="740" y2="380" stroke="#8b949e" stroke-width="0.8"/>
<circle cx="700" cy="355" r="3" fill="#f0c040"/>
<circle cx="700" cy="405" r="3" fill="#f0c040"/>
<circle cx="675" cy="380" r="3" fill="#f0c040"/>
<circle cx="725" cy="380" r="3" fill="#f0c040"/>
<text x="700" y="450" text-anchor="middle" fill="#f0f6fc" font-size="10">Decussate (90° pairs)</text>
<text x="700" y="465" text-anchor="middle" fill="#8b949e" font-size="9">Ω = trivial (𐑷)</text>

<!-- === BOTTOM: Ω Interpretation Table === -->
<text x="430" y="500" text-anchor="middle" fill="#d4a017" font-size="12" font-weight="bold">Ω Value → Preparation Cycle Count</text>

<!-- Table header -->
<rect x="40" y="510" width="780" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
<text x="60" y="527" fill="#d4a017" font-size="10" font-weight="bold">Ω Value</text>
<text x="160" y="527" fill="#d4a017" font-size="10" font-weight="bold">Phyllotaxis Pattern</text>
<text x="390" y="527" fill="#d4a017" font-size="10" font-weight="bold">Preparation Cycles</text>
<text x="620" y="527" fill="#d4a017" font-size="10" font-weight="bold">Example Plants</text>

<!-- Row 1: trivial -->
<rect x="40" y="536" width="780" height="22" rx="0" fill="#0d1117" stroke="#30363d" stroke-width="0.3"/>
<text x="60" y="551" fill="#8b949e" font-size="10">𐑷 (trivial)</text>
<text x="160" y="551" fill="#f0f6fc" font-size="9">Decussate, alternate, whorled</text>
<text x="390" y="551" fill="#f0f6fc" font-size="9">0–1 cycles. No spiral → no winding count</text>
<text x="620" y="551" fill="#8b949e" font-size="9">Sage, Coffee, Mint</text>

<!-- Row 2: binary -->
<rect x="40" y="558" width="780" height="22" rx="0" fill="#161b22" stroke="#30363d" stroke-width="0.3"/>
<text x="60" y="573" fill="#06d6a0" font-size="10">𐑴 (binary/ℤ₂)</text>
<text x="160" y="573" fill="#f0f6fc" font-size="9">Two-state: dimeric, distichous with phase</text>
<text x="390" y="573" fill="#f0f6fc" font-size="9">2 cycles. Two-phase preparation (A then B)</text>
<text x="620" y="573" fill="#8b949e" font-size="9">Ayahuasca (MAOi→DMT)</text>

<!-- Row 3: integer -->
<rect x="40" y="580" width="780" height="22" rx="4" fill="#161b22" stroke="#06d6a0" stroke-width="1"/>
<text x="60" y="595" fill="#06d6a0" font-size="10">𐑭 (integer/ℤ)</text>
<text x="160" y="595" fill="#f0f6fc" font-size="9">Spiral, Fibonacci parastichies</text>
<text x="390" y="595" fill="#f0f6fc" font-size="9">n cycles. Parastichy count = preparation iterations</text>
<text x="620" y="595" fill="#8b949e" font-size="9">Wormwood, Yarrow, Sunflower</text>

</svg>